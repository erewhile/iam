name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Tools (ent & wire)
        run: |
          go install entgo.io/ent/cmd/ent@latest
          go install github.com/google/wire/cmd/wire@latest

      - name: Generate Code
        run: |
          go generate ./internal/ent/...
          $(go env GOPATH)/bin/wire ./internal/wire/...
          go mod tidy

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          FILENAME="iam-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            FILENAME="${FILENAME}.exe"
          fi
          
          go build -ldflags="-s -w" -o dist/$FILENAME
          cd dist && sha256sum $FILENAME > $FILENAME.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iam-artifacts-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: iam-artifacts-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }} - Identity and Access Management"
          generate_release_notes: true 
          files: dist/*
          fail_on_unmatched_files: true